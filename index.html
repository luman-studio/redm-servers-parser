<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedM Resource Stats</title>
<link rel="stylesheet" href="styles.css">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
<script src="app.js"></script>
</head>
<body>

<div class="container" x-data="app">

  <!-- Loading -->
  <template x-if="loading">
    <div class="loading"><div class="spinner"></div>Loading data...</div>
  </template>

  <!-- Error -->
  <template x-if="!loading && error">
    <div class="error">
      Failed to load data: <span x-text="error"></span><br><br>
      Run <code>python parser.py</code> first.
    </div>
  </template>

  <!-- Main content -->
  <template x-if="!loading && !error">
    <div>

      <!-- Header -->
      <header><h1><span>RedM</span> Resource Stats</h1></header>

      <!-- Stats -->
      <div class="stats-bar">
        <div class="stat-item">
          <div class="value" x-text="fmt(totalServers)"></div>
          <div class="label">RedM Servers</div>
        </div>
        <div class="stat-item">
          <div class="value" x-text="fmt(parsedServers)"></div>
          <div class="label">Parsed</div>
        </div>
        <div class="stat-item">
          <div class="value" x-text="fmt(totalResources)"></div>
          <div class="label">Resources</div>
        </div>
      </div>

      <!-- Update info -->
      <div class="update-info">
        <div class="update-row">
          <span>Updated: <strong x-text="lastUpdateText"></strong></span>
        </div>
        <div class="progress-bar"><div class="progress-fill" :style="`width:${parsedPct}%`"></div></div>
        <div class="progress-label">
          <span x-text="`${fmt(parsedServers)} / ${fmt(totalServers)} servers`"></span>
          <span x-text="parsedPct + '%'"></span>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn" :class="{ active: tab==='resources' }" @click="setTab('resources')">Resources</button>
        <button class="tab-btn" :class="{ active: tab==='servers' }" @click="setTab('servers')">Servers</button>
        <button class="tab-btn" :class="{ active: tab==='analytics' }" @click="setTab('analytics')">Analytics</button>
      </div>

      <!-- Search + toolbar (resources & servers tabs) -->
      <template x-if="tab !== 'analytics'">
        <div>
          <div class="search-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" :value="query" @input="debouncedSetQuery($event.target.value)"
              :placeholder="tab === 'servers' ? 'Search servers or resources...' : 'Search resources... (e.g. vorp, redemrp, inventory)'" autocomplete="off">
          </div>
          <div class="toolbar">
            <span class="results-info" x-text="tab === 'servers'
              ? `${fmt(filteredServers.length)} servers`
              : `${fmt(filtered.length)} resources`
            "></span>
            <template x-if="tab === 'resources'">
              <button class="btn-small" :class="{ 'btn-active': hideCommon }" @click="toggleHideCommon"
                x-text="hideCommon ? `Common hidden (>${commonThreshold})` : 'Hide common'"></button>
            </template>
            <button class="btn-small" @click="exportCsv">Export CSV</button>
          </div>
        </div>
      </template>

      <!-- ═══════════ RESOURCES TAB ═══════════ -->
      <template x-if="tab === 'resources'">
        <div>
          <table>
            <thead><tr>
              <th style="width:50px">#</th>
              <th :class="{ sorted: isSorted('name') }" @click="toggleSort('name')">
                Resource<span x-text="sortArrow('name')"></span>
              </th>
              <th :class="{ sorted: isSorted('count') }" @click="toggleSort('count')" style="text-align:right;width:100px">
                Servers<span x-text="sortArrow('count')"></span>
              </th>
            </tr></thead>
            <tbody>
              <template x-for="(r, i) in pageItems" :key="r.name">
                <tr @click="openResource(r.name)">
                  <td class="dim" x-text="page * 50 + i + 1"></td>
                  <td class="mono" x-text="r.name"></td>
                  <td class="count" x-text="r.count"></td>
                </tr>
              </template>
            </tbody>
          </table>

          <!-- Pagination -->
          <div class="pagination" x-show="totalPages > 1">
            <button @click="prevPage" :disabled="page === 0">&larr;</button>
            <span x-text="`${page + 1} / ${totalPages}`"></span>
            <button @click="nextPage" :disabled="page >= totalPages - 1">&rarr;</button>
          </div>
        </div>
      </template>

      <!-- ═══════════ SERVERS TAB ═══════════ -->
      <template x-if="tab === 'servers'">
        <div>
          <table>
            <thead><tr>
              <th style="width:50px">#</th>
              <th>Server</th>
              <th style="text-align:right;width:90px">Players</th>
              <th style="text-align:right;width:100px">Resources</th>
            </tr></thead>
            <tbody>
              <template x-for="(s, i) in pageItems" :key="s.id">
                <tr @click="openServer(s)">
                  <td class="dim" x-text="page * 50 + i + 1"></td>
                  <td x-text="s.name"></td>
                  <td style="text-align:right" x-text="`${s.players} / ${s.max_players}`"></td>
                  <td class="count" x-text="s.resources.length"></td>
                </tr>
              </template>
            </tbody>
          </table>

          <div class="pagination" x-show="totalPages > 1">
            <button @click="prevPage" :disabled="page === 0">&larr;</button>
            <span x-text="`${page + 1} / ${totalPages}`"></span>
            <button @click="nextPage" :disabled="page >= totalPages - 1">&rarr;</button>
          </div>
        </div>
      </template>

      <!-- ═══════════ ANALYTICS TAB ═══════════ -->
      <template x-if="tab === 'analytics'">
        <div>
          <div class="toolbar" style="margin-bottom:16px">
            <span></span>
            <button class="btn-small" :class="{ 'btn-active': hideCommon }" @click="toggleHideCommon"
              x-text="hideCommon ? `Common hidden (>${commonThreshold})` : 'Hide common'"></button>
          </div>

          <!-- Top resources bar chart -->
          <div class="chart-section">
            <div class="chart-title">Top 15 Resources</div>
            <template x-for="r in topResources" :key="r.name">
              <div class="bar-row">
                <div class="bar-name" x-text="r.name" @click="openResource(r.name)" style="cursor:pointer"></div>
                <div class="bar-track">
                  <div class="bar-fill" :style="`width:${Math.round(r.count / maxCount * 100)}%`"></div>
                </div>
                <div class="bar-val" x-text="r.count"></div>
              </div>
            </template>
          </div>

          <!-- Distribution histogram -->
          <div class="chart-section">
            <div class="chart-title">Popularity Distribution (servers using resource)</div>
            <div class="histo-row">
              <template x-for="b in histogram" :key="b.label">
                <div class="histo-col">
                  <div class="histo-count" x-text="b.count"></div>
                  <div class="histo-bar" :style="`height:${Math.max(b.pct, 2)}%`"></div>
                  <div class="histo-label" x-text="b.label"></div>
                </div>
              </template>
            </div>
          </div>

          <!-- Categories -->
          <div class="chart-section">
            <div class="chart-title">Resource Categories (by prefix)</div>
            <div class="tag-cloud">
              <template x-for="c in categories" :key="c.prefix">
                <span class="tag" @click="filterByCategory(c.prefix)">
                  <span x-text="c.prefix + '*'"></span>
                  <span class="tag-count" x-text="c.resources"></span>
                </span>
              </template>
            </div>
          </div>

        </div>
      </template>

      <!-- ═══════════ RESOURCE DETAIL OVERLAY ═══════════ -->
      <template x-if="detail">
        <div class="overlay" @click.self="closeDetail" @keydown.escape.window="closeDetail">
          <div class="panel">
            <button class="close-btn" @click="closeDetail">&times;</button>
            <h2 x-text="detail.name"></h2>
            <div class="sub" x-text="`Used by ${detail.count} server${detail.count !== 1 ? 's' : ''}`"></div>

            <!-- Frequently together -->
            <template x-if="detail.correlated.length > 0">
              <div style="margin-bottom:14px">
                <div style="font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text-dim)">Frequently together:</div>
                <div class="corr-list">
                  <template x-for="c in detail.correlated" :key="c.name">
                    <span class="corr-item" @click="closeDetail(); $nextTick(() => openResource(c.name))">
                      <span x-text="c.name"></span>
                      <span class="corr-pct" x-text="c.pct + '%'"></span>
                    </span>
                  </template>
                </div>
              </div>
            </template>

            <!-- Server list -->
            <div class="scroll-list">
              <table>
                <thead><tr>
                  <th>Server</th>
                  <th style="text-align:right;width:100px">Players</th>
                </tr></thead>
                <tbody>
                  <template x-for="s in detail.servers" :key="s.id">
                    <tr>
                      <td><a class="link" :href="serverLink(s.id)" target="_blank" rel="noopener" x-text="s.name"></a></td>
                      <td style="text-align:right" x-text="`${s.players} / ${s.max_players}`"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </template>

      <!-- ═══════════ SERVER DETAIL OVERLAY ═══════════ -->
      <template x-if="serverDetail">
        <div class="overlay" @click.self="closeServerDetail" @keydown.escape.window="closeServerDetail">
          <div class="panel">
            <button class="close-btn" @click="closeServerDetail">&times;</button>
            <h2 x-text="serverDetail.name"></h2>
            <div class="sub">
              <span x-text="`${serverDetail.players} / ${serverDetail.max_players} players`"></span>
              &mdash;
              <a class="link" :href="serverLink(serverDetail.id)" target="_blank" rel="noopener">View on RedM</a>
              &mdash;
              <span x-text="`${serverDetail.resources.length} resources`"></span>
            </div>
            <div class="scroll-list">
              <table>
                <thead><tr><th>Resource</th></tr></thead>
                <tbody>
                  <template x-for="r in serverDetail.resources" :key="r">
                    <tr style="cursor:pointer" @click="closeServerDetail(); $nextTick(() => openResource(r))">
                      <td class="mono" x-text="r"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </template>

    </div>
  </template>

</div>

</body>
</html>
