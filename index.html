<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedM Resource Stats</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --text-dim: #8b8d97;
    --accent: #c5382a;
    --accent-hover: #d94a3c;
    --green: #4ade80;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  header h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  header h1 span { color: var(--accent); }

  .stats-bar {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .stat-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    text-align: center;
    min-width: 160px;
  }

  .stat-item .value {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-item .label {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .search-box {
    position: relative;
    margin-bottom: 20px;
  }

  .search-box input {
    width: 100%;
    padding: 12px 16px 12px 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--accent); }

  .search-box input::placeholder { color: var(--text-dim); }

  .search-box svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
  }

  .results-info {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  thead th {
    background: #15171f;
    padding: 10px 14px;
    text-align: left;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  thead th:hover { color: var(--text); }
  thead th.sorted { color: var(--accent); }

  thead th .sort-arrow {
    display: inline-block;
    margin-left: 4px;
    font-size: 10px;
  }

  tbody tr {
    border-top: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }

  tbody tr:hover { background: #1f2230; }

  tbody td {
    padding: 10px 14px;
    font-size: 14px;
  }

  td.res-name {
    font-family: 'Consolas', 'Monaco', monospace;
    font-weight: 500;
  }

  td.res-count {
    font-weight: 700;
    color: var(--green);
    text-align: right;
    width: 120px;
  }

  /* Detail panel */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 16px;
    overflow-y: auto;
  }

  .detail-overlay.open { display: flex; }

  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 800px;
    width: 100%;
    padding: 24px;
    position: relative;
  }

  .detail-panel h2 {
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 20px;
    margin-bottom: 4px;
    word-break: break-all;
  }

  .detail-panel .sub {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 16px;
  }

  .detail-panel .close-btn {
    position: absolute;
    right: 16px;
    top: 16px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 24px;
    cursor: pointer;
    line-height: 1;
  }

  .detail-panel .close-btn:hover { color: var(--text); }

  .server-list {
    max-height: 60vh;
    overflow-y: auto;
  }

  .server-list table { font-size: 13px; }

  .server-list th {
    position: sticky;
    top: 0;
    z-index: 1;
  }

  .server-link {
    color: var(--accent);
    text-decoration: none;
  }

  .server-link:hover { text-decoration: underline; }

  .loading {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
    font-size: 16px;
  }

  .loading .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    text-align: center;
    padding: 40px;
    color: #f87171;
  }

  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
  }

  .pagination button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 6px 14px;
    cursor: pointer;
    font-size: 13px;
  }

  .pagination button:hover { border-color: var(--accent); }
  .pagination button:disabled { opacity: 0.4; cursor: default; }

  .pagination span {
    font-size: 13px;
    color: var(--text-dim);
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1><span>RedM</span> Resource Stats</h1>
  </header>

  <div id="stats-bar" class="stats-bar" style="display:none">
    <div class="stat-item">
      <div class="value" id="stat-servers">—</div>
      <div class="label">RedM Servers (total)</div>
    </div>
    <div class="stat-item">
      <div class="value" id="stat-parsed">—</div>
      <div class="label">Servers Parsed</div>
    </div>
    <div class="stat-item">
      <div class="value" id="stat-resources">—</div>
      <div class="label">Unique Resources</div>
    </div>
    <div class="stat-item">
      <div class="value" id="stat-date">—</div>
      <div class="label">Last Parsed</div>
    </div>
  </div>

  <div class="search-box">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="search" placeholder="Search resources... (e.g. vorp, redemrp, inventory)" autocomplete="off">
  </div>

  <div id="results-info" class="results-info"></div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      Loading resource data...
    </div>
  </div>

  <div id="pagination" class="pagination" style="display:none">
    <button id="prev-btn">&larr; Prev</button>
    <span id="page-info"></span>
    <button id="next-btn">Next &rarr;</button>
  </div>
</div>

<!-- Detail overlay -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-panel">
    <button class="close-btn" id="detail-close">&times;</button>
    <h2 id="detail-name"></h2>
    <div class="sub" id="detail-sub"></div>
    <div class="server-list" id="detail-servers"></div>
  </div>
</div>

<script>
const PAGE_SIZE = 50;
let allResources = [];    // [{name, count, servers}]
let filtered = [];
let currentPage = 0;
let sortField = "count";  // "name" | "count"
let sortAsc = false;

async function init() {
  try {
    const resp = await fetch("data/resources.json");
    if (!resp.ok) throw new Error(`HTTP ${resp.status} — run parser.py first`);
    const data = await resp.json();

    document.getElementById("stat-servers").textContent = data.total_servers.toLocaleString();
    document.getElementById("stat-parsed").textContent = (data.total_servers_with_resources || data.total_servers).toLocaleString();
    document.getElementById("stat-resources").textContent = data.total_resources.toLocaleString();
    document.getElementById("stat-date").textContent = new Date(data.parsed_at).toLocaleDateString("ru-RU", {
      day: "numeric", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit"
    });
    document.getElementById("stats-bar").style.display = "flex";

    allResources = Object.entries(data.resources).map(([name, info]) => ({
      name,
      count: info.count,
      servers: info.servers
    }));

    applySort();
    filtered = allResources;
    render();
  } catch (err) {
    document.getElementById("content").innerHTML =
      `<div class="error">Failed to load data: ${err.message}<br><br>Run <code>python parser.py</code> first to generate the data.</div>`;
  }
}

function applySort() {
  const dir = sortAsc ? 1 : -1;
  allResources.sort((a, b) => {
    if (sortField === "count") return (a.count - b.count) * dir;
    return a.name.localeCompare(b.name) * dir;
  });
}

function doSearch() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  filtered = q
    ? allResources.filter(r => r.name.toLowerCase().includes(q))
    : allResources;
  currentPage = 0;
  render();
}

function render() {
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  currentPage = Math.min(currentPage, totalPages - 1);
  const start = currentPage * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);

  // Results info
  const q = document.getElementById("search").value.trim();
  document.getElementById("results-info").textContent = q
    ? `Found ${filtered.length} resources matching "${q}"`
    : `Showing ${filtered.length} resources`;

  // Table
  const arrow = (field) => sortField === field ? (sortAsc ? " \u25B2" : " \u25BC") : "";
  const cls = (field) => sortField === field ? "sorted" : "";

  let html = `<table>
    <thead><tr>
      <th class="${cls("name")}" onclick="toggleSort('name')">#<span class="sort-arrow"></span></th>
      <th class="${cls("name")}" onclick="toggleSort('name')">Resource${arrow("name")}</th>
      <th class="${cls("count")}" onclick="toggleSort('count')" style="text-align:right">Servers${arrow("count")}</th>
    </tr></thead><tbody>`;

  page.forEach((r, i) => {
    html += `<tr onclick="showDetail('${r.name.replace(/'/g, "\\'")}')">
      <td style="color:var(--text-dim);width:50px">${start + i + 1}</td>
      <td class="res-name">${esc(r.name)}</td>
      <td class="res-count">${r.count}</td>
    </tr>`;
  });

  html += "</tbody></table>";
  document.getElementById("content").innerHTML = html;

  // Pagination
  const pag = document.getElementById("pagination");
  if (totalPages > 1) {
    pag.style.display = "flex";
    document.getElementById("page-info").textContent = `${currentPage + 1} / ${totalPages}`;
    document.getElementById("prev-btn").disabled = currentPage === 0;
    document.getElementById("next-btn").disabled = currentPage >= totalPages - 1;
  } else {
    pag.style.display = "none";
  }
}

function toggleSort(field) {
  if (sortField === field) {
    sortAsc = !sortAsc;
  } else {
    sortField = field;
    sortAsc = field === "name";
  }
  applySort();
  filtered = [...filtered].sort((a, b) => {
    const dir = sortAsc ? 1 : -1;
    if (sortField === "count") return (a.count - b.count) * dir;
    return a.name.localeCompare(b.name) * dir;
  });
  render();
}

function showDetail(name) {
  const r = allResources.find(x => x.name === name);
  if (!r) return;

  document.getElementById("detail-name").textContent = r.name;
  document.getElementById("detail-sub").textContent = `Used by ${r.count} server${r.count !== 1 ? "s" : ""}`;

  let html = `<table><thead><tr>
    <th>Server</th><th style="text-align:right;width:100px">Players</th>
  </tr></thead><tbody>`;

  r.servers.forEach(s => {
    const link = s.id ? `https://servers.redm.net/servers/detail/${s.id}` : "#";
    html += `<tr>
      <td><a class="server-link" href="${link}" target="_blank" rel="noopener">${esc(s.name)}</a></td>
      <td style="text-align:right">${s.players} / ${s.max_players}</td>
    </tr>`;
  });

  html += "</tbody></table>";
  document.getElementById("detail-servers").innerHTML = html;

  document.getElementById("detail-overlay").classList.add("open");
}

function closeDetail() {
  document.getElementById("detail-overlay").classList.remove("open");
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// Events
document.getElementById("search").addEventListener("input", doSearch);
document.getElementById("prev-btn").addEventListener("click", () => { currentPage--; render(); });
document.getElementById("next-btn").addEventListener("click", () => { currentPage++; render(); });
document.getElementById("detail-close").addEventListener("click", closeDetail);
document.getElementById("detail-overlay").addEventListener("click", (e) => {
  if (e.target === e.currentTarget) closeDetail();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeDetail();
});

init();
</script>
</body>
</html>
