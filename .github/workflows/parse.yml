name: Parse RedM Servers

on:
  schedule:
    # Runs daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  # ─── Phase 1: Fetch stream and split into chunks ───────────────────
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch stream and split into chunks
        run: python parser.py prepare -w 8

      - name: Upload chunks
        uses: actions/upload-artifact@v4
        with:
          name: chunks
          path: data/chunks/
          retention-days: 1

  # ─── Phase 2: Fetch server details (parallel workers) ──────────────
  fetch:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        worker: [0, 1, 2, 3, 4, 5, 6, 7]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download chunks
        uses: actions/download-artifact@v4
        with:
          name: chunks
          path: data/chunks/

      - name: Fetch server details for chunk ${{ matrix.worker }}
        run: |
          CHUNK="data/chunks/chunk_${{ matrix.worker }}.json"
          if [ -f "$CHUNK" ]; then
            python parser.py fetch -c "$CHUNK" -o "data/results/result_${{ matrix.worker }}.json"
          else
            echo "Chunk file not found (fewer servers than workers), skipping."
            mkdir -p data/results
            echo "{}" > "data/results/result_${{ matrix.worker }}.json"
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.worker }}
          path: data/results/result_${{ matrix.worker }}.json
          retention-days: 1

  # ─── Phase 3: Merge results and commit ─────────────────────────────
  merge:
    needs: fetch
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download chunks (for stream info)
        uses: actions/download-artifact@v4
        with:
          name: chunks
          path: data/chunks/

      - name: Download all worker results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: data/results/
          merge-multiple: true

      - name: Merge results
        run: python parser.py merge

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/resources.json
          git diff --cached --quiet || git commit -m "Update resource data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
