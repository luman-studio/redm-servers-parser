name: Parse RedM Servers

on:
  workflow_dispatch: # Manual trigger only

permissions:
  contents: write

jobs:
  # ─── Phase 1: Fetch stream and split into chunks ───────────────────
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.split.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch stream and split into chunks
        id: split
        run: |
          python parser.py prepare
          WORKERS=$(python -c "import json; print(json.load(open('data/chunks/stream_info.json'))['worker_count'])")
          MATRIX=$(python -c "import json; print(json.dumps(list(range($WORKERS))))")
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Workers: $WORKERS, Matrix: $MATRIX"

      - name: Upload chunks
        uses: actions/upload-artifact@v4
        with:
          name: chunks
          path: data/chunks/
          retention-days: 1

  # ─── Phase 2: Fetch server details (parallel workers) ──────────────
  fetch:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        worker: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download chunks
        uses: actions/download-artifact@v4
        with:
          name: chunks
          path: data/chunks/

      - name: Fetch server details for chunk ${{ matrix.worker }}
        run: python parser.py fetch -c "data/chunks/chunk_${{ matrix.worker }}.json" -o "data/results/result_${{ matrix.worker }}.json"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.worker }}
          path: data/results/result_${{ matrix.worker }}.json
          retention-days: 1

  # ─── Phase 3: Merge results and commit ─────────────────────────────
  merge:
    needs: fetch
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download chunks (for stream info)
        uses: actions/download-artifact@v4
        with:
          name: chunks
          path: data/chunks/

      - name: Download all worker results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: data/results/
          merge-multiple: true

      - name: Merge results
        run: python parser.py merge

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/resources.json
          git diff --cached --quiet || git commit -m "Update resource data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
